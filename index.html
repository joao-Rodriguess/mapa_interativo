<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa Seguro (OpenStreetMap)</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- CSS (Local - Critical) -->
    <link rel="stylesheet" href="style.css">

    <!-- Leaflet CSS (Non-Blocking for instant spinner) -->
    <link rel="preload" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" as="style"
        onload="this.onload=null;this.rel='stylesheet'">
    <noscript>
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    </noscript>

    <!-- Leaflet Routing Machine CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />

    <!-- MediaPipe JS (Defer) -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"
        defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"
        defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"
        defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous" defer></script>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>

<body>

    <!-- Map Container -->
    <div id="map"></div>

    <!-- UI Overlay -->
    <div class="ui-overlay">
        <header class="header">
            <h1>Mapa Seguro (OSM)</h1>
            <div class="status-badge" id="status-badge">
                <span class="status-dot"></span>
                <span id="status-text">Iniciando Sistema...</span>
            </div>
        </header>

        <div class="controls-guide">
            <div class="guide-item">
                <div class="icon">📍</div>
                <span id="location-status">Localizando você...</span>
            </div>
            <div class="guide-item">
                <div class="icon">✊</div>
                <span>Feche a mão para arrastar</span>
            </div>
        </div>
    </div>

    <!-- Camera Feed -->
    <div class="camera-container">
        <video class="input_video"></video>
        <canvas class="output_canvas" width="320" height="240"></canvas>
    </div>

    <!-- Loading Overlay -->
    <div id="loading-overlay"
        style="position:fixed;top:0;left:0;width:100%;height:100%;background:#0f172a;z-index:9999;display:flex;justify-content:center;align-items:center;flex-direction:column;color:white;font-family:'Inter';transition:opacity 0.5s;">
        <div class="spinner"
            style="width:50px;height:50px;border:5px solid #333;border-top:5px solid #6366f1;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:20px;">
        </div>
        <h3>Carregando Sistema...</h3>
        <p style="color:#94a3b8;font-size:0.9rem;">Baixando Inteligência Artificial (aprox. 10s)</p>
    </div>
    <!-- Loader Styles -->
    <style>
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>

    <!-- App Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" defer></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js" defer></script>
    <script src="script.js" defer></script>
</body>

</html>
